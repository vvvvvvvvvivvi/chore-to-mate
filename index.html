
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chore-to-Mate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #F5F5F7;
        color: #111827;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Refined scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

      /* Input time/date native styling */
      input[type="date"], input[type="time"] { color-scheme: light; }

      /* Smooth transitions globally */
      button { cursor: pointer; }

      /* Glass effect utility */
      .glass {
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      /* Neutral card shadow */
      .card-shadow {
        box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
      }

      .card-shadow-lg {
        box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 12px 32px rgba(0,0,0,0.10);
      }

      /* Gradient button */
      .btn-primary {
        background: linear-gradient(135deg, #4F52A0 0%, #6466C8 100%);
        box-shadow: 0 4px 14px rgba(79,82,160,0.35);
      }
      .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(79,82,160,0.25); }

      /* Header gradient */
      .header-gradient {
        background: linear-gradient(135deg, #3B3D80 0%, #5254A3 100%);
        box-shadow: 0 2px 20px rgba(59,61,128,0.3);
      }
    </style>
